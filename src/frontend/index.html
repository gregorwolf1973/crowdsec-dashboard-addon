<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrowdSec Dashboard</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #050a14; color: #e2e8f0; font-family: 'Courier New', monospace; min-height: 100vh; }
button { cursor: pointer; font-family: inherit; transition: opacity 0.15s; }
button:hover:not(:disabled) { opacity: 0.8; }
button:disabled { opacity: 0.4; cursor: default; }
input { font-family: inherit; outline: none; }
table { width: 100%; border-collapse: collapse; }
tr:hover td { background: rgba(255,255,255,0.02); }
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: #0a0f1e; }
::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
.header { background: #0a0f1e; border-bottom: 1px solid #1e293b; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; position: sticky; top: 0; z-index: 10; }
.tabs { background: #0a0f1e; border-bottom: 1px solid #0f172a; padding: 10px 24px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.content { padding: 20px 24px; }
.table-wrap { border-radius: 8px; overflow-x: auto; margin-bottom: 28px; }
th { padding: 9px 14px; text-align: left; font-size: 10px; color: #475569; letter-spacing: 0.15em; font-weight: normal; border-bottom: 1px solid #1e293b; white-space: nowrap; }
td { padding: 9px 14px; border-bottom: 1px solid #0f172a; }
.empty { text-align: center; color: #1e293b; padding: 80px; font-size: 13px; }
.error-bar { margin: 16px 24px; background: #ef444415; border: 1px solid #ef444430; border-radius: 6px; padding: 12px; color: #ef4444; font-size: 12px; }
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;gap:12px;">
    <div style="width:36px;height:36px;background:linear-gradient(135deg,#1e40af,#3b82f6);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;">🛡️</div>
    <div>
      <div style="font-size:14px;font-weight:bold;letter-spacing:0.12em;color:#f1f5f9;">CROWDSEC DASHBOARD</div>
      <div id="lastUpdate" style="font-size:10px;color:#334155;">Lade...</div>
    </div>
  </div>
  <div style="display:flex;gap:20px;align-items:center;">
    <div style="text-align:center;"><div id="sTotal" style="font-size:20px;font-weight:bold;color:#ef4444;">-</div><div style="font-size:9px;color:#334155;letter-spacing:0.15em;">GESAMT</div></div>
    <div style="text-align:center;"><div id="sLocal" style="font-size:20px;font-weight:bold;color:#f97316;">-</div><div style="font-size:9px;color:#334155;letter-spacing:0.15em;">LOKAL</div></div>
    <div style="text-align:center;"><div id="sCapi" style="font-size:20px;font-weight:bold;color:#3b82f6;">-</div><div style="font-size:9px;color:#334155;letter-spacing:0.15em;">CAPI</div></div>
    <div style="width:1px;height:36px;background:#1e293b;"></div>
    <button id="refreshBtn" onclick="loadData()" style="background:#1e293b;border:1px solid #334155;color:#94a3b8;border-radius:6px;padding:7px 14px;font-size:11px;">↻ REFRESH</button>
  </div>
</div>

<div class="tabs">
  <button id="tabDec" onclick="setTab('decisions')" style="background:#1e293b;border:1px solid #334155;color:#f1f5f9;border-radius:6px;padding:5px 14px;font-size:11px;">🔒 Bans (<span id="cntBan">0</span>)</button>
  <button id="tabAlt" onclick="setTab('alerts')" style="background:transparent;border:1px solid transparent;color:#475569;border-radius:6px;padding:5px 14px;font-size:11px;">⚡ Alerts (<span id="cntAlt">0</span>)</button>
  <div style="flex:1;"></div>
  <input id="search" placeholder="IP, Grund oder Land suchen..." oninput="renderDecisions()"
    style="background:#1e293b;border:1px solid #334155;color:#e2e8f0;border-radius:6px;padding:6px 14px;font-size:11px;width:260px;">
</div>

<div id="errBar" class="error-bar" style="display:none;"></div>

<div class="content">
  <div id="vDecisions">
    <div id="secLocal" style="margin-bottom:28px;display:none;">
      <div style="font-size:10px;letter-spacing:0.2em;margin-bottom:10px;color:#f97316;">★ LOKALE BANS (<span id="cntLocal">0</span>)</div>
      <div class="table-wrap" style="background:#0a0f1e;border:1px solid #f9731625;">
        <table><thead><tr style="background:#0f172a;">
          <th>IP / Range</th><th>Grund</th><th>Land</th><th>Ablauf</th><th></th>
        </tr></thead><tbody id="bodyLocal"></tbody></table>
      </div>
    </div>
    <div id="secCapi" style="display:none;">
      <div style="font-size:10px;letter-spacing:0.2em;margin-bottom:10px;color:#3b82f6;">☁ COMMUNITY BLOCKLIST (<span id="cntCapi">0</span>)</div>
      <div class="table-wrap" style="background:#0a0f1e;border:1px solid #3b82f625;">
        <table><thead><tr style="background:#0f172a;">
          <th>IP / Range</th><th>Grund</th><th>Land</th><th>Ablauf</th><th></th>
        </tr></thead><tbody id="bodyCapi"></tbody></table>
      </div>
    </div>
    <div id="emptyDec" class="empty">Lade Daten...</div>
  </div>
  <div id="vAlerts" style="display:none;">
    <div class="table-wrap" style="background:#0a0f1e;border:1px solid #1e293b;">
      <table><thead><tr style="background:#0f172a;">
        <th>ID</th><th>IP</th><th>Szenario</th><th>Land</th><th>Zeit</th>
      </tr></thead><tbody id="bodyAlerts"></tbody></table>
    </div>
  </div>
</div>

<script>
// Konfiguration
const API_URL = '/crowdsec-api';
const BOUNCER_KEY = 'EzZ93PzOjP/v6ujzI4dVzHgd/pCTY8FLcPt+9X7L6Qg';
const MACHINE_ID = 'crowdsec-dashboard';
const MACHINE_PASS = 'password';

let decisions = [], alerts = [];
let jwtToken = null;
let jwtExpiry = null;

async function getToken() {
  if (jwtToken && jwtExpiry && new Date() < new Date(jwtExpiry - 60000)) {
    return jwtToken;
  }
  const r = await fetch(`${API_URL}/v1/watchers/login`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ machine_id: MACHINE_ID, password: MACHINE_PASS })
  });
  if (!r.ok) throw new Error('Login fehlgeschlagen');
  const data = await r.json();
  jwtToken = data.token;
  jwtExpiry = data.expire;
  return jwtToken;
}

function flag(c) {
  if (!c || c.length !== 2) return '🌐';
  try { return String.fromCodePoint(...[...c.toUpperCase()].map(x => 0x1F1E6 + x.charCodeAt(0) - 65)); }
  catch { return '🌐'; }
}

function badge(reason) {
  const r = (reason||'').toLowerCase();
  const col = r.includes('bf')||r.includes('brute') ? '#ef4444'
    : r.includes('scan')||r.includes('prob') ? '#f97316'
    : r.includes('cve')||r.includes('exploit') ? '#a855f7'
    : r.includes('back') ? '#ec4899'
    : r.includes('custom') ? '#22c55e' : '#3b82f6';
  const lbl = (reason||'').replace('crowdsecurity/','').replace('custom/','★ ');
  return `<span style="background:${col}20;border:1px solid ${col}50;color:${col};border-radius:4px;padding:2px 8px;font-size:11px;font-family:monospace;white-space:nowrap;">${lbl}</span>`;
}

async function loadData() {
  const btn = document.getElementById('refreshBtn');
  if (btn) { btn.textContent = '...'; btn.disabled = true; }
  try {
    const h = { 'X-Api-Key': BOUNCER_KEY };
    const [dr, ar] = await Promise.all([
      fetch(`${API_URL}/v1/decisions?limit=500`, { headers: h }),
      fetch(`${API_URL}/v1/alerts?limit=100`, { headers: h })
    ]);
    if (!dr.ok) throw new Error(`Fehler ${dr.status}`);
    decisions = await dr.json() || [];
    alerts = ar.ok ? (await ar.json() || []) : [];
    document.getElementById('lastUpdate').textContent = '↻ ' + new Date().toLocaleTimeString('de-DE');
    document.getElementById('errBar').style.display = 'none';
    updateStats();
    renderDecisions();
    renderAlerts();
  } catch(e) {
    const eb = document.getElementById('errBar');
    eb.textContent = '⚠️ ' + e.message;
    eb.style.display = 'block';
    document.getElementById('emptyDec').textContent = 'Fehler beim Laden';
    document.getElementById('emptyDec').style.display = 'block';
  }
  if (btn) { btn.textContent = '↻ REFRESH'; btn.disabled = false; }
}

function updateStats() {
  const local = decisions.filter(d => d.origin !== 'CAPI').length;
  const capi = decisions.filter(d => d.origin === 'CAPI').length;
  document.getElementById('sTotal').textContent = decisions.length;
  document.getElementById('sLocal').textContent = local;
  document.getElementById('sCapi').textContent = capi;
  document.getElementById('cntBan').textContent = decisions.length;
  document.getElementById('cntAlt').textContent = alerts.length;
}

function renderDecisions() {
  const q = (document.getElementById('search')?.value||'').toLowerCase();
  const f = decisions.filter(d => !q || ((d.value||'')+(d.reason||'')+(d.country||'')).toLowerCase().includes(q));
  const local = f.filter(d => d.origin !== 'CAPI');
  const capi = f.filter(d => d.origin === 'CAPI');
  document.getElementById('cntLocal').textContent = local.length;
  document.getElementById('cntCapi').textContent = capi.length;
  document.getElementById('secLocal').style.display = local.length ? 'block' : 'none';
  document.getElementById('secCapi').style.display = capi.length ? 'block' : 'none';
  document.getElementById('emptyDec').style.display = (!local.length && !capi.length) ? 'block' : 'none';
  document.getElementById('bodyLocal').innerHTML = local.map(row).join('');
  document.getElementById('bodyCapi').innerHTML = capi.map(row).join('');
}

function row(d) {
  return `<tr>
    <td style="color:#f1f5f9;font-family:monospace;font-size:13px;">${d.value||''}</td>
    <td>${badge(d.reason)}</td>
    <td><span style="display:flex;align-items:center;gap:6px;">${flag(d.country)}<span style="color:#64748b;font-size:12px;">${d.country||'??'}</span></span></td>
    <td style="color:#475569;font-size:11px;font-family:monospace;">${d.duration||'∞'}</td>
    <td><button id="del${d.id}" onclick="del(${d.id})"
      style="background:#ef444415;border:1px solid #ef444430;color:#ef4444;border-radius:4px;padding:3px 10px;font-size:11px;">
      🗑 aufheben</button></td>
  </tr>`;
}

function renderAlerts() {
  document.getElementById('bodyAlerts').innerHTML = alerts.length
    ? alerts.map(a => `<tr>
        <td style="color:#475569;font-size:12px;">#${a.id}</td>
        <td style="color:#f1f5f9;font-family:monospace;font-size:13px;">${a.source?.ip||'-'}</td>
        <td>${badge(a.scenario)}</td>
        <td>${flag(a.source?.cn)} <span style="color:#64748b;font-size:12px;">${a.source?.cn||'??'}</span></td>
        <td style="color:#475569;font-size:11px;">${a.created_at ? new Date(a.created_at).toLocaleString('de-DE') : '-'}</td>
      </tr>`).join('')
    : '<tr><td colspan="5" style="padding:60px;text-align:center;color:#334155;">Keine Alerts</td></tr>';
}

async function del(id) {
  const btn = document.getElementById('del'+id);
  if (btn) { btn.textContent='...'; btn.disabled=true; }
  try {
    const token = await getToken();
    const r = await fetch(`${API_URL}/v1/decisions/${id}`, {
      method: 'DELETE',
      headers: { 'Authorization': `Bearer ${token}` }
    });
    if (!r.ok) throw new Error(`Fehler ${r.status}`);
    decisions = decisions.filter(d => d.id !== id);
    updateStats();
    renderDecisions();
  } catch(e) {
    alert('Fehler: ' + e.message);
    if (btn) { btn.textContent='🗑 aufheben'; btn.disabled=false; }
  }
}

function setTab(tab) {
  document.getElementById('vDecisions').style.display = tab==='decisions' ? 'block' : 'none';
  document.getElementById('vAlerts').style.display = tab==='alerts' ? 'block' : 'none';
  const a = 'background:#1e293b;border:1px solid #334155;color:#f1f5f9;border-radius:6px;padding:5px 14px;font-size:11px;cursor:pointer;font-family:inherit;';
  const i = 'background:transparent;border:1px solid transparent;color:#475569;border-radius:6px;padding:5px 14px;font-size:11px;cursor:pointer;font-family:inherit;';
  document.getElementById('tabDec').style.cssText = tab==='decisions' ? a : i;
  document.getElementById('tabAlt').style.cssText = tab==='alerts' ? a : i;
}

loadData();
setInterval(loadData, 30000);
</script>
</body>
</html>
