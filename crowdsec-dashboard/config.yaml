name: "CrowdSec Dashboard"
description: "Real-time dashboard for CrowdSec bans, alerts and decisions with full management capabilities"
version: "1.0.8"
slug: "crowdsec_dashboard"
init: false
arch:
  - aarch64
  - amd64
  - armv7
startup: services
boot: auto
ingress: true
ingress_port: 8099
panel_icon: mdi:shield-bug
panel_title: CrowdSec
homeassistant_api: false
hassio_api: false
options:
  crowdsec_url: "http://424ccef4-crowdsec:8080"
  machine_id: "crowdsec-dashboard"
  machine_password: "dashboard123"
  log_level: "info"
schema:
  crowdsec_url: str
  machine_id: str
  machine_password: str
  log_level: list(debug|info|warning|error)
map:
  - config:rw

