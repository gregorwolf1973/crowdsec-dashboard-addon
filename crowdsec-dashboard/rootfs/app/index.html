<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CrowdSec Dashboard</title>
  <style>
:root[data-theme="dark"] {
  --bg: #111318; --bg-card: #1c1f26; --bg-input: #2a2d36; --bg-hover: #252830;
  --border: rgba(255,255,255,0.08); --border-hover: rgba(255,255,255,0.15);
  --text: #e0e3ea; --text-secondary: #9099aa; --text-muted: #565d6e;
  --accent: #03a9f4; --accent-bg: rgba(3,169,244,0.12);
  --red: #f44336; --red-bg: rgba(244,67,54,0.12);
  --green: #4caf50; --green-bg: rgba(76,175,80,0.12);
  --yellow: #ff9800; --yellow-bg: rgba(255,152,0,0.12);
  --sidebar-w: 240px; --header-h: 56px; --radius: 12px; --radius-sm: 8px;
}
:root[data-theme="light"] {
  --bg: #f0f2f5; --bg-card: #ffffff; --bg-input: #f5f6f8; --bg-hover: #f0f2f5;
  --border: rgba(0,0,0,0.08); --border-hover: rgba(0,0,0,0.15);
  --text: #1a1d23; --text-secondary: #565d6e; --text-muted: #9099aa;
  --accent: #0288d1; --accent-bg: rgba(2,136,209,0.1);
  --red: #d32f2f; --red-bg: rgba(211,47,47,0.1);
  --green: #388e3c; --green-bg: rgba(56,142,60,0.1);
  --yellow: #f57c00; --yellow-bg: rgba(245,124,0,0.1);
  --sidebar-w: 240px; --header-h: 56px; --radius: 12px; --radius-sm: 8px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 14px; height: 100vh; overflow: hidden;
  display: grid; grid-template-rows: var(--header-h) 1fr;
}
.header { display: flex; align-items: center; padding: 0 16px; gap: 12px;
  background: var(--bg-card); border-bottom: 1px solid var(--border); z-index: 20; }
.logo { width: 32px; height: 32px; background: var(--accent); border-radius: 8px;
  display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.header-title { font-size: 16px; font-weight: 600; }
.header-sub { font-size: 11px; color: var(--text-muted); }
.header-gap { flex: 1; }
.status-pill { display: flex; align-items: center; gap: 6px; padding: 4px 10px;
  background: var(--green-bg); border-radius: 20px; font-size: 12px; color: var(--green); font-weight: 500; }
.status-pill.error { background: var(--red-bg); color: var(--red); }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.icon-btn { width: 36px; height: 36px; border: none; background: var(--bg-input);
  border-radius: var(--radius-sm); color: var(--text-secondary); cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 16px; transition: background .15s, color .15s; }
.icon-btn:hover { background: var(--bg-hover); color: var(--text); }
.icon-btn.spinning { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.content { display: grid; grid-template-columns: var(--sidebar-w) 1fr; overflow: hidden; }
.sidebar { background: var(--bg-card); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; padding: 12px 8px; gap: 2px; overflow-y: auto; }
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 2px; }
.nav-section { font-size: 11px; font-weight: 600; color: var(--text-muted);
  padding: 8px 8px 4px; letter-spacing: .5px; text-transform: uppercase; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px;
  border-radius: var(--radius-sm); cursor: pointer; color: var(--text-secondary);
  font-size: 13px; transition: all .15s; }
.nav-item:hover { background: var(--bg-hover); color: var(--text); }
.nav-item.active { background: var(--accent-bg); color: var(--accent); font-weight: 500; }
.nav-icon { font-size: 16px; width: 20px; text-align: center; flex-shrink: 0; }
.nav-badge { margin-left: auto; padding: 1px 7px; border-radius: 10px; font-size: 11px;
  font-weight: 600; background: var(--red-bg); color: var(--red); }
.nav-badge.blue { background: var(--accent-bg); color: var(--accent); }
.nav-badge.yellow { background: var(--yellow-bg); color: var(--yellow); }
.stat-card { margin: 4px 0; padding: 12px; background: var(--bg-input);
  border-radius: var(--radius-sm); border: 1px solid var(--border); }
.stat-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px;
  text-transform: uppercase; letter-spacing: .5px; }
.stat-value { font-size: 26px; font-weight: 700; line-height: 1; }
.stat-value.red { color: var(--red); } .stat-value.blue { color: var(--accent); }
.stat-value.yellow { color: var(--yellow); } .stat-value.green { color: var(--green); }
.stat-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.sidebar-footer { margin-top: auto; padding: 8px; border-top: 1px solid var(--border); }
.timer-label { font-size: 11px; color: var(--text-muted); text-align: center; margin-bottom: 6px; }
.timer-track { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.timer-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 1s linear; }
.main { display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }
.tabs { display: flex; align-items: center; gap: 0; padding: 0 16px;
  background: var(--bg-card); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.tab { padding: 16px 14px; cursor: pointer; font-size: 13px; font-weight: 500;
  color: var(--text-secondary); border-bottom: 2px solid transparent; transition: all .15s; white-space: nowrap; }
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.toolbar { display: flex; align-items: center; gap: 8px; padding: 10px 16px;
  background: var(--bg-card); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.search-wrap { flex: 1; max-width: 320px; position: relative; }
.search-icon-inner { position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  color: var(--text-muted); font-size: 14px; pointer-events: none; }
.search-input { width: 100%; padding: 7px 10px 7px 32px; background: var(--bg-input);
  border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text);
  font-size: 13px; outline: none; font-family: inherit; transition: border-color .15s; }
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--text-muted); }
.select-input { padding: 7px 10px; background: var(--bg-input); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text); font-size: 13px; outline: none; cursor: pointer; font-family: inherit; }
.toolbar-gap { flex: 1; }
.btn { display: flex; align-items: center; gap: 6px; padding: 7px 14px;
  border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; cursor: pointer;
  border: none; font-family: inherit; transition: all .15s; }
.btn-danger { background: var(--red-bg); color: var(--red); border: 1px solid rgba(244,67,54,0.2); }
.btn-danger:hover { background: rgba(244,67,54,0.2); }
.btn-primary { background: var(--accent-bg); color: var(--accent); border: 1px solid rgba(3,169,244,0.2); }
.btn-primary:hover { background: rgba(3,169,244,0.2); }
.table-wrap { flex: 1; overflow-y: auto; }
.table-wrap::-webkit-scrollbar { width: 6px; }
.table-wrap::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 3px; }
table { width: 100%; border-collapse: collapse; }
thead { position: sticky; top: 0; z-index: 5; background: var(--bg-card); }
th { padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 600;
  color: var(--text-muted); border-bottom: 1px solid var(--border);
  text-transform: uppercase; letter-spacing: .5px; white-space: nowrap; }
tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
tbody tr:hover { background: var(--bg-hover); }
td { padding: 9px 14px; font-size: 13px; }
.ip-text { font-weight: 600; color: var(--accent); font-family: 'SF Mono','Fira Code',monospace; font-size: 12px; }
.scenario-text { color: var(--text-secondary); font-size: 12px; }
.url-text { color: var(--text-muted); font-size: 11px; font-family: monospace;
  max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.time-text { color: var(--text-muted); font-size: 12px; }
.badge { display: inline-flex; align-items: center; padding: 2px 8px;
  border-radius: 4px; font-size: 11px; font-weight: 600; letter-spacing: .3px; }
.badge-ban { background: var(--red-bg); color: var(--red); }
.badge-captcha { background: var(--yellow-bg); color: var(--yellow); }
.badge-other { background: var(--accent-bg); color: var(--accent); }
.badge-capi { background: var(--accent-bg); color: var(--accent); }
.badge-local { background: var(--green-bg); color: var(--green); }
.badge-manual { background: var(--yellow-bg); color: var(--yellow); }

/* Delete-Button: nur bei lokalen Bans, nur bei Hover sichtbar */
.del-btn {
  padding: 4px 10px; border-radius: 6px; background: transparent;
  border: 1px solid var(--border); color: var(--text-muted); cursor: pointer;
  font-size: 12px; font-family: inherit;
  opacity: 0;
  transition: opacity .15s, background .15s, border-color .15s, color .15s;
}
tbody tr:hover .del-btn { opacity: 1; }
.del-btn:hover { background: var(--red-bg); border-color: var(--red); color: var(--red); }

.empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.empty-icon { font-size: 40px; margin-bottom: 12px; opacity: .4; }
.empty-title { font-size: 16px; font-weight: 500; color: var(--text-secondary); }
.loading-cell { text-align: center; padding: 60px; color: var(--text-muted); }
.spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite;
  margin-right: 8px; vertical-align: middle; }
.pagination { display: flex; align-items: center; justify-content: center; gap: 4px; padding: 10px 16px;
  background: var(--bg-card); border-top: 1px solid var(--border); flex-shrink: 0; }
.page-btn { min-width: 32px; height: 32px; padding: 0 8px; border: 1px solid var(--border);
  background: transparent; color: var(--text-secondary); border-radius: var(--radius-sm);
  cursor: pointer; font-size: 13px; font-family: inherit; transition: all .15s; }
.page-btn:hover { background: var(--bg-hover); color: var(--text); }
.page-btn.active { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); font-weight: 600; }
.page-btn:disabled { opacity: .3; cursor: not-allowed; }
.page-info { font-size: 12px; color: var(--text-muted); padding: 0 8px; }

/* Alerts-Panel: nur Zähler-Info, keine Karten */
.alerts-info-panel { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
.alerts-count-box { background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 32px 48px; text-align: center; }
.alerts-count-number { font-size: 64px; font-weight: 700; color: var(--yellow); line-height: 1; }
.alerts-count-label { font-size: 14px; color: var(--text-muted); margin-top: 8px; }
.alerts-hint { font-size: 12px; color: var(--text-muted); }

.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  backdrop-filter: blur(4px); z-index: 100; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--bg-card); border: 1px solid var(--border-hover); border-radius: var(--radius);
  padding: 24px; max-width: 380px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.4); animation: modal-in .2s ease; }
